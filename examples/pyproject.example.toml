# Global Settings
# The settings for the CLI.

[tool.pydantic_settings_export]
# default_settings: array
# The default settings to use. The settings are applied in the order they are
# listed. Each entry can be either 'module:attribute' to import a specific class
# or instance, a plain module path (e.g. 'app.settings') to auto-discover all
# BaseSettings subclasses defined in that module, a path to a Python file (e.g.
# './app/settings.py'), or a path to a directory (e.g. './app/settings') to
# recursively discover settings in all Python files.
# Default: []
# Examples: ["settings:settings"], ["app.config.settings:Settings","app.config.settings.dev:Settings"], ["app.config.settings"], ["./app/settings.py"], ["./app/settings"]
# default_settings = []

# root_dir: Path
# The project directory. Used for relative paths in the configuration file and
# .env file. If not set, will be the same as project_dir.
# Default: "<project_dir>"
# root_dir = "<project_dir>"

# project_dir: Path
# The project directory. Used for importing settings.
# Default: "<project_dir>"
# project_dir = "<project_dir>"

# venv: string | null
# Virtual environment to use when importing settings. Possible values: 'auto'
# (auto-detect from ./venv, ./.venv, uv, or poetry), 'uv' (use uv-managed venv),
# 'poetry' (use Poetry-managed venv), a path to the venv directory (relative paths
# are resolved from project_dir), or null/empty string to disable.
# Default: "auto"
# Examples: "auto", "poetry", "uv", "./.venv", "/path/to/.venv"
# venv = "auto"

# respect_exclude: boolean
# Respect the exclude attribute in the fields.
# Default: true
# respect_exclude = true

# env_file: Path | null
# The path to the .env file to load environment variables. Useful when you have a
# Settings class/instance, which requires values while running.
# Default: null
# env_file =

# Relative Directory Settings
# Settings for the relative directory.

[tool.pydantic_settings_export.relative_to]
# replace_abs_paths: boolean
# Replace absolute paths with relative path to project root.
# Default: true
# replace_abs_paths = true

# alias: string
# The alias for the relative directory.
# Default: "<project_dir>"
# alias = "<project_dir>"
