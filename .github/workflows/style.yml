name: Style

permissions:
  contents: read

on:
  push:
  pull_request:
  workflow_call:

jobs:
  style:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.10"

      - name: Install the project
        run: uv sync --all-extras --dev --frozen --no-editable

      - uses: actions/cache@v4
        with:
          path: ~/.cache/prek
          key: prek-1|${{ hashFiles('prek.toml') }}

      - name: Run prek
        run: uv run --frozen --no-editable prek run --all-files --show-diff-on-failure --color=always
